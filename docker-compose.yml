name: persona-rag

services:
  qdrant:
    image: qdrant/qdrant:v1.11.0
    container_name: persona-rag-qdrant
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.16.0
    container_name: persona-rag-mlflow
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
    ports:
      - "5001:5000"   # host 5001 → container 5000 (macOS AirPlay holds 5000)
    volumes:
      - mlflow_data:/mlflow
    restart: unless-stopped

  bot:
    build: .
    container_name: persona-rag-bot
    env_file: .env
    environment:
      QDRANT_URL: http://qdrant:6333
      MLFLOW_TRACKING_URI: http://mlflow:5000
    depends_on:
      - qdrant
      - mlflow
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    profiles: ["bot"]   # opt-in: docker-compose --profile bot up

  streamlit:
    build: .
    container_name: persona-rag-streamlit
    command: uv run streamlit run streamlit_app/main.py --server.address 0.0.0.0
    env_file: .env
    environment:
      QDRANT_URL: http://qdrant:6333
      MLFLOW_TRACKING_URI: http://mlflow:5000
    ports:
      - "8501:8501"
    depends_on:
      - qdrant
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    profiles: ["demo"]  # opt-in: docker-compose --profile demo up

volumes:
  qdrant_storage:
  mlflow_data:
