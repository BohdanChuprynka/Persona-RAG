repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.2
    hooks:
      - id: mypy
        additional_dependencies:
          - pydantic
          - pydantic-settings
          - sqlmodel
          - types-python-dateutil
          - structlog
          - openai
          - tenacity
          - qdrant-client
          - rank-bm25
          - aiogram
        args: [--strict, persona_rag]
        pass_filenames: false
